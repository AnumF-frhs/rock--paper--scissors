<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper, & Scissors</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Playwrite+NZ+Guides&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

<div class="page-bg text-center">
		<header class="py-4 text-center">
            <h1 class="display-6 pixel"> Welcome to...</h1>
			<h1 class="display-6 pixel"> 🌙 Rock, Paper, & Scissors! 🌙</h1>
		</header>
</div>

<div class="stars"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>

<main class="container">
    
	<div class="row g-4 justify-content-center text-center">
		<div class="col-12 col-md-8">
			<section class="card hud-card">
				<div class="card-body">
				 <h2 class="card-title pixel mb-5"> 🎮 Play HUD 🎮</h2>
                 <h5>Select between rock, paper, or scissors below...within the starry night...</h5>
				 <div class="hud-grid">

                    <div class="hud-item">
						<div class="label pixel"> Player's Score 🌝 </div>

						<div id="scoreDisplay" class="value pixel">--</div>
					</div>
                    <div class="hud-item">
                        <div class="label pixel"> Computer's Score 🌚</div>
                        <div id="oppDisplay" class="value pixel">--</div>
                    </div>
				  <div class="hud-item status-full">
				  <div class="label pixel"> 💫 Opponent's item 💫</div>
				  <div id="computerChoice" class="value pixel">--</div>
					</div>
				 </div>
			    </div>
			</section>
		</div>

				
	</div>


</main>

<div class="row g-3 mt-4 justify-content-center controls-row">
				<!-- Rock -->
				<div class="col-12 col-md-4 mb-2 controls-col">
					<button id="rockInput" class="btn btn-border-warning btn-lg pixel w-100">Rock 🪨</button>
				</div>
				<!-- scissors -->
				<div class="col-12 col-md-4 mb-2 controls-col">
					<div class="mb-2">
					</div>
					<button id="scissorsInput" class="btn btn-border-dark btn-lg pixel w-100">Scissors ✂️</button>
				</div>
				<!-- Paper -->
				<div class="col-12 col-md-4 mb-2 controls-col">
					<button id="paperInput" class="btn btn-border-danger btn-lg pixel w-100">Paper 📝</button>
				</div>
				<div class="col-12 col-md-4 mb-2 controls-col">
					<button id="resetBtn" class="btn btn-border-warning btn-lg pixel w-100"> 🔃 Reset Game 🔃</button>
				</div>
				
</div>

<script src="js/script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>   
</body>
</html>
